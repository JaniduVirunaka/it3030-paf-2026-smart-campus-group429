name: Smart Campus Hub CI/CD

# This tells GitHub to run the script whenever code is pushed to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Test the Spring Boot Backend
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test Spring Boot
      # Update 'backend/pom.xml' if your backend folder has a different name
      run: mvn -B clean install --file backend/pom.xml

  # Job 2: Test the React Frontend
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Dependencies and Build
      # Update 'frontend' if your React folder has a different name
      working-directory: ./frontend
      run: |
        npm install
        npm run build